control_question:
  question: >
    Does ONTOLOGY already contain principal, agent, relationship, credential,
    or authority schemas that would make a dedicated Identity Authority
    duplicate entity models?
  answer: no_normative_identity_entity_suite
  detail: >
    Knowledge-graph labels and an unmerged descriptive Agent schema exist.
    SpendingAuthority names a principal field in prose only. No credential,
    session, mandate, delegation, wallet-identity, or root authority schemas
    exist. Safe to designate/create Identity Authority after PAY audit, with
    coordination to prevent semantic drift on shared words (Agent, principal).

